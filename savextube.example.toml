# SaveXTube 微信 ClawBot 专用配置

[wechat]
# 首次登录后自动写入 /app/config/wechat_session.json；不建议手工填 token。
session_file = "/app/config/wechat_session.json"
base_url = "https://ilinkai.weixin.qq.com"
cdn_base_url = "https://novac2c.cdn.weixin.qq.com/c2c"
bot_agent = "SaveXTubeWeixin/1.0.0"

# 可选。留空表示所有给机器人发消息的微信用户都可用。
# 登录后日志或 wechat_session.json 里可看到 user_id。
allowed_user_ids = ""

# 微信不能编辑历史消息，只能追加发送进度；建议不要太频繁。
progress_interval = 20

# 单次下载最多回传多少个文件，防止播放列表刷屏。
max_send_files = 20

# 同时处理多少个下载任务。NAS 上建议 1；性能更强时可改 2。
max_concurrent_downloads = 1

# 默认只支持这些平台：抖音、快手、微博、头条视频、小红书、B站。
# 抖音视频和 /note/ 图文/Live Photo 默认优先走移动分享页解析器。
supported_platforms = "douyin,kuaishou,weibo,toutiao,xiaohongshu,bilibili"

# 文件成功通过微信回传后是否删除容器内本地文件。
# 想保留下载文件就改成 false，文件会留在宿主机 ./downloads。
cleanup_after_send = true

[proxy]
# proxy_host = "http://192.168.2.1:7890"

[logging]
log_level = "INFO"
log_dir = "/app/logs"
log_max_size = 10
log_backup_count = 5
log_to_console = true
log_to_file = true
